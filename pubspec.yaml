name: node_flow
description: >-
  React Flow-style node editor canvas for Flutter: pan/zoom viewport, draggable
  nodes, drag-to-connect edges, marquee selection, snap guides, and a minimap.
version: 0.1.1
repository: https://github.com/kshdotdev/nodeflow
issue_tracker: https://github.com/kshdotdev/nodeflow/issues
topics:
  - node-editor
  - flow
  - canvas
  - graph
  - diagram

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
